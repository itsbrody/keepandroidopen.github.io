# What Google is doing
# [en] what_heading: "What Google is doing"
what_heading: "O que o Google está fazendo"
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Googl..."
what_intro: >-
  Em agosto de 2025, o Google [anunciou](https://developer.android.com/developer-verification) um novo requisito: a partir de setembro de 2026, **todos os desenvolvedores de aplicativos Android deverão se registrar centralmente junto ao Google** antes que seu software possa ser instalado em qualquer dispositivo. Não apenas os aplicativos da Play Store: todos os aplicativos. Isso inclui aplicativos compartilhados entre amigos, distribuídos através do [F-Droid](https://f-droid.org), criados por amadores para uso pessoal. 
  Desenvolvedores independentes, grupos religiosos e comunitários, assim como amadores, serão impedidos de desenvolver e distribuir seus softwares.
# [en] what_registration: "Registration requires:"
what_registration: "O registro implica em:"
# [en] what_req_fee: "Paying a fee to Google"
what_req_fee: "Pagar uma taxa ao Google"
# [en] what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_terms: "Concordar com os Termos e Condições do Google"
# [en] what_req_id: "Surrendering your government-issued identification"
what_req_id: "Entregar o seu documento de identidade oficial emitido pelo governo"
# [en] what_req_signing: "Providing evidence of your private signing key"
what_req_signing: "Apresentar provas da sua chave de assinatura privada"
# [en] what_req_appids: "Listing all current and all future application identifiers"
what_req_appids: "Listar todos os identificadores de aplicativo, atuais e futuros"
# [en] what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: "Se um desenvolvedor não cumprir as regras, seus aplicativos serão bloqueados automaticamente em todos os dispositivos Android do mundo inteiro."

# Who this hurts
# [en] impact_heading: "Who this hurts"
impact_heading: "Quem é prejudicado por isso"
# [en] impact_you_heading: "You"
impact_you_heading: "Você"
# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "Você comprou um celular Android porque o Google disse que era um sistema aberto. Você poderia instalar o que quisesse, e esse era o acordo."
# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *..."
impact_you_p2: "O Google está agora reformulando esse acordo, com efeito retroativo, no hardware que você já possui. Após a atualização, você só poderá executar softwares pré-aprovados pelo Google. No seu próprio celular: *seu* dispositivo, pelo qual *você* pagou."
# [en] impact_dev_heading: "Independent developers"
impact_dev_heading: "Desenvolvedores independentes"
# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: "O primeiro aplicativo de um adolescente, uma ferramenta de privacidade criada por um voluntário ou uma versão beta interna confidencial de uma empresa. Não importa. A partir de setembro de 2026, nenhum desses aplicativos poderá ser instalado sem a aprovação do Google."
# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-dec..."
impact_dev_p2: >-
  A [F-Droid](https://f-droid.org), que hospeda milhares de aplicativos Android gratuitos e de código aberto, classificou isso como uma [ameaça "existencial"](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow chama isso de ["Darth Android"](https://pluralistic.net/2025/09/01/fulu/).
# [en] impact_gov_heading: "Governments & civil society"
impact_gov_heading: "Governos & sociedade civil"
# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that r..."
impact_gov_p1: >-
  O Google tem um [histórico comprovado](https://www.aclu.org/news/free-speech/app-store-oligopoly) de acatar as exigências de regimes autoritários quando estes solicitam a remoção de aplicativos. Com esse programa, o software executado pelas instituições do seu país ficará à mercê de uma única empresa estrangeira que não presta contas a ninguém.
# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: >-
  A [EFF considera](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) controles de acesso à aplicativos "um caminho cada vez mais fácil para a censura na internet".

# Advanced flow
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "A \"saída de emergência\" do Google é uma armadilha"
# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: >-
  O Google afirma que os "usuários avançados" podem ["ainda instalar"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) aplicativos não verificados. Veja como isso *realmente* funciona:
# [en] flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "Acesse as Configurações do Sistema e localize as Opções de Desenvolvedor"
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "Toque no número da versão **sete vezes** para ativar o Modo de Desenvolvedor"
# [en] flow_step3: "Dismiss scare screens about coercion"
flow_step3: "Ignore os alertas alarmistas sobre coerção"
# [en] flow_step4: "Enter your PIN"
flow_step4: "Digite seu PIN"
# [en] flow_step5: "Restart the device"
flow_step5: "Reinicie o dispositivo"
# [en] flow_step6: "**Wait 24 hours**"
flow_step6: "**Aguarde por 24 horas**"
# [en] flow_step7: "Come back, dismiss more scare screens"
flow_step7: "Volte, feche mais telas de alerta"
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: "Escolha entre \"permitir temporariamente\" (7 dias) ou \"permitir indefinidamente\""
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: "Confirme, mais uma vez, que compreende \"os riscos\""
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: "Nove etapas. Um período de espera obrigatório de 24 horas. *Para instalar software em um dispositivo de sua propriedade.*"
# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And ..."
flow_detail: >-
  Pior ainda: esse fluxo opera inteiramente por meio do **Google Play Services**, e não do sistema operacional Android. O Google pode alterá-lo, restringir seu acesso ou desativá-lo a qualquer momento, sem a necessidade de atualização do sistema operacional e sem precisar de consentimento. E, até o momento, ele não foi incluído em nenhuma versão beta, preview ou canary. Ele existe apenas como uma publicação no blog e algumas maquetes.

# Precedent
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "Isso vai além do Android"
# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: "Se o Google pode bloquear retroativamente bilhões de dispositivos que foram vendidos como plataformas abertas, todos os fabricantes de hardware do mundo estarão de olho nisso."
# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at ..."
precedent_p1: >-
  O precedente que está sendo estabelecido: **a empresa que fabricou o seu dispositivo decide, depois que você o comprou, qual software você tem permissão para executar.** No mundo do software, isso é chamado de "rug pull"; mas, pelo menos, você sempre podia instalar um software concorrente. No hardware, trata-se de um *fato consumado* que tira de você o poder de decisão e o deixa à mercê dos caprichos de um único guardião irresponsável e monopolista convicto.
# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally..."
precedent_p2: >-
  A abertura do Android nunca foi apenas um recurso. Era a *promessa* que o diferenciava do iPhone. Milhões de pessoas escolheram o Android exatamente por esse motivo. Agora, o Google está revogando essa promessa unilateralmente, em dispositivos *que já* estão nos bolsos das pessoas, porque decidiu que possui domínio de mercado e influência regulatória suficientes para se safar dessa.
# [en] precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle And..."
precedent_arstechnica: >-
  [Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *"A inveja do Google pela Apple ameaça desmantelar o legado aberto do Android."*

# Objections
# [en] objections_heading: "But wait, isn't this..."
objections_heading: "Mas espere, isso não é..."
# [en] obj_security_q: "\"...just about security?\""
obj_security_q: "\"...só sobre segurança?\""
# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* id..."
obj_security_a: >-
  O argumento da segurança é uma cortina de fumaça. O Google Play Protect já verifica a presença de malware independentemente da identidade do desenvolvedor. Exigir um documento de identidade oficial não torna o código mais seguro. Isso torna *os desenvolvedores* identificáveis e controláveis. Os autores de malware podem se registrar. Desenvolvedores independentes e dissidentes, muitas vezes, não conseguem. A [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) é direta: o controle de acesso baseado em identidade é uma ferramenta de censura, não de segurança.
# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: "\"...possível fazer sideloading se você usar o fluxo avançado?\""
# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** b..."
obj_sideloading_a: >-
  Nove etapas, espera de 24 horas, escondido nas Opções do Desenvolvedor, disponibilizado por meio de um serviço proprietário que o Google pode revogar quando quiser. Isso não é instalação paralela. É um **mecanismo de dissuasão** criado para garantir que quase ninguém consiga concluir o processo. E como ele funciona por meio do Play Services, e não do sistema operacional, o Google pode restringir ou desativá-lo discretamente.
# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: "\"...um problema somente se você tem algo a esconder?\""
# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distr..."
obj_hide_a: >-
  Informantes, jornalistas e ativistas que vivem sob governos autoritários serão as primeiras vítimas. As pessoas em situações de violência doméstica são as próximas. Todos esses grupos têm motivos legítimos para distribuir ou usar software sem que sua identidade legal seja registrada em um banco de dados do Google. A contribuição anônima para o código aberto é uma tradição mais antiga do que o próprio Google. Essa política põe fim a isso no Android.
# [en] obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: "\"...a mesma coisa que a Apple faz?\""
# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory press..."
obj_apple_a: >-
  A Apple tem sido um "jardim murado" desde o início. As pessoas escolheram o Android *porque ele era diferente*. Dizer que "A Apple também faz isso” é aceitar uma corrida para o fundo do poço e um fraco argumento *tu quoque*. E sob pressão regulatória (a Lei dos Mercados Digitais da UE), até mesmo a Apple está sendo forçada a se abrir. O Google está indo na direção oposta: tentando consolidar ainda mais seu status de centralizador.
# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: "\"...só $25 e um pouco de burocracia?\""
# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health..."
obj_cost_a: >-
  Talvez, se você for um desenvolvedor nos EUA com um cartão de crédito e uma carteira de motorista. Tente ser um estudante na África Subsaariana, ou um dissidente em Mianmar, ou um voluntário que mantém um aplicativo comunitário de saúde. O custo não é apenas financeiro: você está entregando sua identidade oficial e suas chaves de assinatura a uma empresa que [atende rotineiramente](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) às exigências do governo para remover aplicativos e expor desenvolvedores.

