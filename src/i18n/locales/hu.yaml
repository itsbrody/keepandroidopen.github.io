flow_detail: "Ráadásul: ez a folyamat teljes egészében a **Google Play Servicesen** keresztül fut, nem az Android operációs rendszeren. A Google ezt bármikor módosíthatja vagy megszüntetheti, operációs rendszer frissítése nélkül."
