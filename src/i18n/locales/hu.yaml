flow_step1: "Nyisd meg a rendszerbeállításokat, és keresd meg a fejlesztői beállításokat"
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "Koppints a buildszámra **hétszer** a fejlesztői mód engedélyezéséhez"
