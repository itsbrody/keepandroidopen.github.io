# What Google is doing
what_heading: "Что делает Google"
what_intro: >-
  В августе 2025 года, Google <a href="https://developer.android.com/developer-verification" target="_blank">анонсировал &#8599;</a> новое требование: начиная с сентября 2026 года, <strong>каждый
  разработчик Android-приложений будет должен зарегистрироваться в Google</strong> перед тем, как их ПО будет доступно для установки на любое устройство. Не только приложения из Play Store: все приложения.
  Это также имеет в виду приложения, которыми делятся среди друзей и которые распространяются через <a href="https://f-droid.org">F-Droid &#8599;</a>, созданные любителями для личного использования.
  Независимые разработчики, церковные и общественные группы, или просто любители - все они больше не смогут разрабатывать и распространять свое программное обеспечение.
what_registration: "Для регистрации нужно:"
what_req_fee: "Заплатить комиссию Google"
what_req_terms: "Согласиться с условиями Google"
what_req_id: "Пройти верификацию документом, удостоверяющим личность"
what_req_signing: "Доказать владение приватным ключем подписи"
what_req_appids: "Предоставить все текущие и будущие идентификаторы приложений"
what_pullquote: "Если разработчики не соблюдают правила, их приложения будут заблокированы на каждом Android-устройстве по всему миру."

# Who this hurts
impact_heading: "На кого это влияет"
impact_you_heading: "На Вас"
impact_you_p1: "Вы купили Android-смартфон, потому что Google рассказали вам, что это открытая операционная система. Вы могли устанавливать что хотите, и это было договоренностью."
impact_you_p2: >-
  Google изменяют эту договоренность, на железе, которым вы уже владеете. После того, как обновление установится, вы сможете запускать только те приложения,
  которые Google предварительно проверили. На вашем смартфоне: <i>ваше</i> имущество, за которые вы заплатили.
impact_dev_heading: "На независимых разработчиков"
impact_dev_p1: >-
  Первое приложение подростка, инструмент обеспечения приватности от волонтеров, или внутренние конфиденциальные бета-версии приложений компаний.
  Это не имеет значения. После сентября 2026 года, ничего из этого может быть установлено без одобрения Google.
impact_dev_p2: >-
  <a href="https://f-droid.org" target="_blank">F-Droid &#8599;</a>, дом для тысяч бесплатных Android-приложений с открытым исходным кодом, назвал это <a href="https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html">
  экзистенциальной угрозой&#8599;</a>. Кори Доктороу называет это <a href="https://pluralistic.net/2025/09/01/fulu/" target="_blank">"Darth Android"&#8599;</a>.
impact_gov_heading: "На правительства и гражданские общества"
impact_gov_p1: >-
  У Google есть задокументированный опыт удаления приложений по требованию авторитарных режимов.
  С этой программой ПО, на котором работают государственные институты вашей страны, будет полностью зависеть от воли одной неподотчётной иностранной компании.
impact_gov_p2: >-
  <a href="https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship" target="_blank">EFF называет &#8599;</a> контроль доступа к приложениям
  "бесконечно расширяющимся" путем к цензуре интернета.

# Advanced flow
flow_heading: "\"Запасной люк\" от Google - это ловушка"
flow_intro: >-
  Google говорит, что <a href="https://android-developers.googleblog.com/2026/03/android-developer-verification.html" target="_blank">продвинутые пользователи</a>
  смогут устанавливать неподтвержденные приложения. Вот как это выглядит <i>на самом деле</i>:
flow_step1: "Откройте Системные Настройки, найдите Настройки Разработчика"
flow_step2: "Нажмите на номер сборки <strong>семь раз</strong>, чтобы включить Режим Разработчика"
flow_step3: "Пропустите устрашающие предупреждения"
flow_step4: "Введите PIN-код"
flow_step5: "Перезагрузите устройство"
flow_step6: "<strong>Подождите 24 часа</strong>"
flow_step7: "Вернитесь и пропустите еще больше устрашающий предупреждений"
flow_step8: "Выберите: \"разрешить временно\" (7 дней) или \"разрешить бессрочно\""
flow_step9: "Подтвердите еще раз, что вы осознаете все \"риски\""
flow_summary: "9 шагов. Обязательный 24-часовой период ожидания. <em>Для установки приложения на устройство, которым Вы владеете</em>"
flow_detail: "Хуже: этот процесс происходит полностью через <strong>сервисы Google Play</strong>, а не Android. Google могут изменять, затягивать или полностью убить его в любое время, без обновления системы и согласия."

# Precedent
precedent_heading: "Это - больше, чем Android"
precedent_pullquote: "Если Google задним числом начнет ограничивать миллиарды устройств, которые были проданы как свободные платформы, каждый производитель оборудования будет наблюдать за этим."
precedent_p1: >-
  Установленный принцип: производитель вашего устройства может решать, какие приложения вам разрешено запускать, после того как вы купили устройство. В сфере разработки ПО это называется "rug pull";
  но по крайней мере вы всегда могли устанавливать конкурирующие приложения. В сфере железа, это <i>fait accompli</i> который лишает вас выбора и делает вас бессильными перед желаниями
  единственного неподотчетного и осужденного монополиста, контролирующего доступ к приложениям.
precedent_p2: >-
  Открытость Android никогда не было просто особенностью. Это было <i>обещание</i>, которое отличало его от iPhone. Миллионы людей выбрали Android именно по этой причине.
  Теперь Google отзывает это обещание...
precedent_arstechnica: >-
  <a href="https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/" target="_blank">Ars Technica &#8599;</a>:
  <em>"Зависть Google к Apple угрожает разрушением наследия открытости Android."</em></a>

# Objections
objections_heading: "Но подождите, разве это не..."
obj_security_q: "\"...о безопасности?\""
obj_security_a: >-
  Основание безопасности - это просто попытка скрыть правду. Google Play Protect уже сканирует вирусы независимо от разработчика. Требование паспорта не делает код безопаснее. Это делает <i>разработчиков</i>
  идентифицируемыми и контроллируемыми. Авторы вирусов тоже могут зарегистрироваться. Инди разработчики или диссиденты - часто не могут.
  <a href="https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship">EFF</a> говорит прямо - контроль доступа по личности это инструмент
  контроля, а не безопасности.
obj_sideloading_q: "\"...все еще доступен sideloading если вы продвинутый пользователь?\""
obj_sideloading_a: >-
  Девять шагов, 24-часовое ожидание, закопанное в настройках разработчика, предоставленное через проприетарный сервис, который Google может отключить когда они хотят. Это не sideloading.
  Это механизм сдерживания, построенный для того, чтобы убедиться что никто не может пройти его. И когда он работает через сервисы Google Play, а не операционную систему,
  Google может незаметно затянуть или выключить это.
obj_hide_q: "\"...проблема только если у вас есть что скрывать?\""
obj_hide_a: >-
  Информаторы, журналисты и активисты в авторитарных правительствах будут первыми жертвами. Люди, оказавшиеся в ситуациях домашнего насилия будут следующими. Все эти группы имеют законные причины
  использовать или распространять программное обеспечение без отправки их правовой идентичности в базу данных Google. Анонимные вклады в проекты с открытым исходным кодом это традиция,
  которая старше чем сама Google. Эта политика больше не работает в Android.
obj_apple_q: "\"...то же самое, что делает Apple?\""
obj_apple_a: >-
  Apple была "ограниченным садом" с первого дня. Люди выбирали Android <i>потому что</i> он отличается. "Apple делает то же самое" - это гонка к низу и слабый аргумент <i>tu quoque</i>.
  И под давлением регуляций (EU Digital Markets Act), даже Apple заставили открыться. Google двигается в противоположном направлении - попытка еще больше укрепить свой статус
  контролирующего.
obj_cost_q: "\"...только $25 и немного документов?\""
obj_cost_a: >-
  Может быть, если вы разработчик из США с кредитной картой и водительским удостоверением. Попробуйте побыть студентом из Африки или диссидентом из Мьянмы, или волонтером
  обслуживающим приложение для охраны здоровья населения. Цена не только финансовая; вы сдаете свой государственный ID и доказательство ваших ключей подписи в компанию,
  которая <a href="https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/" target="_blank">регулярно следует &#8599;</a> государственным
  требованиям удалять приложения и раскрывать их разработчиков.

