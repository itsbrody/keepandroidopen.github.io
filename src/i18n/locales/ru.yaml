# [en] act_dev_heading: "Developers"
act_dev_heading: "Разработчики"
# [en] act_dev_intro: "<strong style=\"text-transform: uppercase;\">Do not sign up.</strong> Don't join the program by signing up for the Android Developer Console and agreeing to their irrevocable Terms and Conditions. Do..."
act_dev_intro: >-
  <strong style="text-transform: uppercase;">Не регистрируйтесь.</strong> Не присоединяйтесь к этой программе регистрацией в Android Developer Console и соглашением с их
  безотзывными условиями. Не подтверждайте свою личность.
# [en] act_dev_resist: "Google's plan only works if developers comply. Don't."
act_dev_resist: "План Google работает только если разработчики следуют ему. Не делайте так."
# [en] act_dev_talk: "Talk other developers and organizations out of signing up."
act_dev_talk: "Отговорите других разработчиков от регистрации."
# [en] act_dev_warn: "Add the [FreeDroidWarn library](https://github.com/woheller69/FreeDroidWarn) to your apps to warn users."
act_dev_warn: "Добавьте [библиотеку FreeDroidWarn](https://github.com/woheller69/FreeDroidWarn), чтобы предупредить пользователей вашего приложения."
# [en] act_dev_banner: "Run a website? [Add the countdown banner.](/banner)"
act_dev_banner: "Владеете веб-сайтом? [Добавьте баннер с обратным отсчетом](/banner)"
# [en] act_google_heading: "Google employees"
act_google_heading: "Сотрудники Google"
# [en] act_google_text: "If you know something about the program's technical implementation or internal rationale, contact [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) from a *non-work* machine and a *non-Gm..."
act_google_text: >-
  Если вы знаете что-нибудь о технической реализации или внутренней логике, свяжитесь с нами чеерз [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org)
  с *не с рабочего компьютера* и *не с Gmail-аккаунта*. Конфиденциальность гарантирована.

