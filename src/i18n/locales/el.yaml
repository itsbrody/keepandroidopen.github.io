# [en] title: "Keep Android Open"
title: "Διατηρήστε το Android ανοιχτό"
# [en] description: "Your phone is about to stop being yours. In September 2026, Google will block every Android app whose developer hasn't registered with them."
description: >-
  Υπερασπίζοντας το Android ως μία ελεύθερη, ανοιχτή πλατφόρμα για την οποία όλοι να μπορούν να δημιουργούν εφαρμογές.
# [en] contact_header: "Contact"
contact_header: "Επικοινωνία"
# [en] contact_email: "Email"
contact_email: "Ηλεκτρονικό ταχυδρομείο"
# [en] site_problems_header: "Problems"
site_problems_header: "Προβλήματα"
# [en] site_report_issues: "Report Site Issues"
site_report_issues: "Αναφέρετε ζητήματα στην ιστοσελίδα"
# [en] site_disclaimer: "**Disclaimer:** This website is a community-driven noncommercial undertaking. It is operated solely for informational and educational purposes."
site_disclaimer: >-
  **Προσοχή:** Αυτόν τον ιστότοπο τον έχει αναλάβει μη κερδοσκοπικά η κοινότητα. Λειτουργεί μόνο για σκοπούς εκπαίδευσης και πληροφόρησης.
# [en] site_privacy: "**Privacy:** This site uses no cookies and performs no user tracking or logging."
site_privacy: >-
  **Ιδιωτικότητα:** Αυτός ο ιστότοπος δεν χρησιμοποιεί cookies και δεν επιχειρεί καμία παρακολούθηση ή καταγραφή.
# [en] site_copyright: "**Copyright:** None. This work is marked"
site_copyright: "**Πνευματικά δικαιώματα:** Κανένα. Αυτό το έργο φέρει τη σήμανση"
# [en] open_letter_cta: "Read our open letter opposing the Android Developer Verification program"
open_letter_cta: "Διαβάστε την ανοιχτή επιστολή μας κατά του προγράμματος επαλήθευσης προγραμματιστών Android"

