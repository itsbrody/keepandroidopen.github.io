# [en] hero_sub: "Starting September 2026, a silent update, nonconsensually pushed by Google, will **block every Android app** whose developer hasn't registered with Google, signed their contract, paid up, and hande..."
hero_sub: >-
  À partir de septembre 2026, une mise à jour silencieuse, imposée sans consentement par Google, **bloquera toutes les applications Android** dont le développeur ne s'est pas enregistré auprès de Google, n'a pas signé son contrat, n'a pas payé et n'a pas fourni de pièce d'identité officielle.
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Googl..."
what_intro: >-
  En août 2025, Google [a annoncé](https://developer.android.com/developer-verification) une nouvelle exigence: à partir de septembre 2026, **tout développeur d'applications Android devra s'inscrire auprès de Google** avant que son logiciel puisse être installé sur un appareil. Cela concerne toutes les applications, et pas seulement celles du Play Store. Cela inclut les applications partagées entre amis, distribuées via [F-Droid](https://f-droid.org), ou encore celles créées par des amateurs pour un usage personnel. Les développeurs indépendants, les groupes religieux et communautaires, ainsi que les amateurs, seront tous empêchés de développer et de distribuer leurs logiciels.
# [en] what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: >-
  Si un développeur ne se conforme pas à la réglementation, ses applications seront silencieusement bloquées sur tous les appareils Android du monde entier.
# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: >-
  Vous avez acheté un téléphone Android parce que Google vous avait dit qu'il était ouvert. Vous pouviez installer ce que vous vouliez, et c'était le marché.
# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *..."
impact_you_p2: >-
  Google modifie désormais cet accord, rétroactivement, sur les appareils que vous possédez déjà. Après la mise à jour, vous ne pourrez exécuter que les applications préalablement approuvées par Google. Sur votre téléphone : *votre appareil*, que *vous* avez payé.
# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: >-
  Première application d'un adolescent, outil de protection de la vie privée d'un bénévole ou version bêta interne confidentielle d'une entreprise : peu importe. Après septembre 2026, aucune de ces applications ne pourra être installée sans l'autorisation de Google.
# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-dec..."
impact_dev_p2: >-
  [F-Droid](https://f-droid.org), qui héberge des milliers d'applications Android gratuites et open source, a qualifié cela de [menace "existentielle"](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow le nomme ["Darth Android"](https://pluralistic.net/2025/09/01/fulu/).
# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that r..."
impact_gov_p1: >-
  Google a un [historique bien documenté](https://www.aclu.org/news/free-speech/app-store-oligopoly) de sa capacité à se conformer aux exigences de retrait d'applications formulées par des régimes autoritaires. Avec ce programme, le logiciel qui fait fonctionner les institutions de votre pays sera à la merci d'une seule et unique multinationale étrangère irresponsable.
# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: >-
  [L’EFF qualifie](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) le contrôle d’accès aux applications de "voie toujours plus large vers la censure d’Internet."
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "La \"trappe de secours\" de Google est un piège."
# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: >-
  Google indique que les "utilisateurs avancés" peuvent ["toujours installer"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) des applications non vérifiées. Voici à quoi cela ressemble *concrètement* :
# [en] flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "Accéder aux paramètres système et recherchez les options pour les développeurs."
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "Appuyer **sept fois** sur le numéro de build pour activer le mode développeur."
# [en] flow_step3: "Dismiss scare screens about coercion"
flow_step3: "Ignorer les écrans alarmistes concernant la coercition"
# [en] flow_step4: "Enter your PIN"
flow_step4: "Saisir votre code PIN"
# [en] flow_step5: "Restart the device"
flow_step5: "Redémarrer l'appareil"
# [en] flow_step6: "**Wait 24 hours**"
flow_step6: "**Attendre 24 heures**"
# [en] flow_step7: "Come back, dismiss more scare screens"
flow_step7: "Revenir, ignorer plus d'écrans alarmistes"
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: "Choisir \"autoriser temporairement\" (7 jours) ou \"autoriser définitivement\""
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: "Confirmer, de nouveau, que vous comprenez \"les risques\""
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: >-
  Neuf étapes. Une période de réflexion obligatoire de 24 heures.*Pour installer du logiciel sur un apparail qui vous appartient.*
# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And ..."
flow_detail: >-
  Pire encore : ce flux passe entièrement par les services **Google Play**, et non par le système d’exploitation Android. Google peut le modifier, le restreindre ou le supprimer à tout moment, sans mise à jour du système d’exploitation ni consentement requis. À ce jour, il n’est intégré à aucune version bêta, préversion ou version Canary. Il n’existe pour l’instant que sous forme d’article de blog et de quelques maquettes.
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "C'est plus grand qu'Android"
# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: >-
  Si Google peut verrouiller rétroactivement des milliards d'appareils vendus comme plateformes ouvertes, tous les fabricants de matériel de la planète ont les yeux rivés sur eux.
# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at ..."
precedent_p1: >-
  Le principe qui s'impose est le suivant : **après l'achat de votre appareil, l'entreprise qui l'a fabriqué décide des logiciels que vous êtes autorisé à utiliser.** Dans le domaine du logiciel, on parle d'une "arnaque éclair" ; mais au moins, vous pouviez toujours installer des logiciels concurrents. Dans le domaine du matériel, c'est un *fait accompli* qui vous prive de toute liberté de choix et vous rend impuissant face aux caprices d'un unique détenteur de pouvoir irresponsable et d'un monopoliste condamné.
# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally..."
precedent_p2: >-
  L'ouverture d'Android n'a jamais été une simple fonctionnalité. C'était la *promesse* qui le distinguait de l'iPhone. Des millions de personnes ont choisi Android précisément pour cette raison. Google revient aujourd'hui unilatéralement sur cette promesse, sur des appareils *déjà* en circulation, car l'entreprise estime que sa position dominante sur le marché et son emprise sur la réglementation lui permettent d'agir ainsi en toute impunité.
# [en] obj_security_q: "\"...just about security?\""
obj_security_q: "\"...juste à propos de la sécurité ?\""
# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* id..."
obj_security_a: >-
  L'argument de sécurité invoqué n'est qu'un leurre. Google Play Protect analyse déjà les applications à la recherche de logiciels malveillants indépendamment de l'identité du développeur. Exiger une pièce d'identité officielle ne rend pas le code plus sûr. Cela permet d'identifier et de contrôler les *développeurs*. Les auteurs de logiciels malveillants peuvent s'enregistrer. Les développeurs indépendants et les dissidents, souvent, ne le peuvent pas. L'[EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) est catégorique : le contrôle d'accès basé sur l'identité est un outil de censure, et non de sécurité.
# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: "\"...toujours du sideloading si l'on utilise un processus avancé?\""
# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** b..."
obj_sideloading_a: >-
  Neuf étapes, 24 heures d'attente, dissimulées dans les options pour développeurs, via un service propriétaire que Google peut révoquer à tout moment. Il ne s'agit pas d'installation d'applications hors du système. C'est un **mécanisme de dissuasion** conçu pour empêcher presque tout le monde de le mener à bien. Et comme il passe par les services Google Play et non par le système d'exploitation, Google peut le restreindre ou le supprimer discrètement.
# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: "\"...seulement un problème si l'on a quelque chose à cacher ?\""
# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distr..."
obj_hide_a: >-
  Les lanceurs d'alerte, les journalistes et les militants sous les régimes autoritaires seront les premières victimes. Les personnes victimes de violences conjugales viendront ensuite. Tous ces groupes ont des raisons légitimes de distribuer ou d'utiliser des logiciels sans que leur identité légale soit enregistrée dans la base de données de Google. La contribution anonyme aux logiciels libres est une tradition antérieure à Google lui-même. Cette politique y met fin sur Android.
# [en] obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: "\"...la même politique qu'Apple?\""
# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory press..."
obj_apple_a: >-
  Depuis sa création, Apple a toujours été un écosystème fermé. Les utilisateurs ont choisi *Android parce qu'il était différent*. Affirmer "qu'Apple fait pareil" relève d'une course au moins-disant et d'un argument *fallacieux*. Sous la pression réglementaire (notamment la directive européenne sur les marchés numériques), même Apple est contrainte de s'ouvrir. Google, quant à lui, prend le contrepied de cette tendance : il cherche à consolider son monopole.
# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: "\"...seulement $25 et un peu de paperasse?\""
# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health..."
obj_cost_a: >-
  Peut-être, si vous êtes un développeur américain possédant une carte de crédit et un permis de conduire. Imaginez être étudiant en Afrique subsaharienne, dissident au Myanmar ou bénévole gérant une application de santé communautaire. Le coût n'est pas seulement financier : vous devez fournir une pièce d'identité officielle et des justificatifs, ou vos clés de signature, à une entreprise qui [se plie systématiquement](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) aux exigences gouvernementales de suppression d'applications et de dénonciation des développeurs.
# [en] act_everyone_heading: "Everyone"
act_everyone_heading: "Tout le monde"
# [en] act_fdroid: "**[Install F-Droid](https://f-droid.org)** on every Android device you own. Alternative stores only survive if people actually use them."
