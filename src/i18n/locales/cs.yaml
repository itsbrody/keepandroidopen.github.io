# [en] act_letter: "**[Read and share our open letter](/open-letter)**"
act_letter: >-
  **[Přečtěte si a sdílejte náš otevřený dopis](/open-letter)**
# [en] act_survey: "**Tell Google what you think of this** through their own [developer verification survey](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <..."
act_survey: >-
  **Řekněte Googlu, co si o tom myslíte** prostřednictvím jejich vlastního [průzkumu k ověřování vývojářů](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(i když to asi nic nezmění)</small>.
# [en] act_dev_heading: "Developers"
act_dev_heading: "Vývojáři"
# [en] act_dev_intro: "<strong style=\"text-transform: uppercase;\">Do not sign up.</strong> Don't join the program by signing up for the Android Developer Console and agreeing to their irrevocable Terms and Conditions. Do..."
act_dev_intro: >-
  <strong style="text-transform: uppercase;">Neregistrujte se.</strong> Nepřipojujte se k programu tím, že se byste se zaregistrovali do Android Developer Console a souhlasili s jejich neodvolatelnými Podmínkami použití. Neověřujte svou totožnost.  *Nehrajte jejich hru.*
# [en] act_dev_resist: "Google's plan only works if developers comply. Don't."
act_dev_resist: "Plán Googlu bude fungovat jen, když budou vývojáři spolupracovat. Nespolupracujte."
# [en] act_dev_talk: "Talk other developers and organizations out of signing up."
act_dev_talk: "Přemluvte ostatní vývojáře a organizace, aby se neregistrovali."
# [en] act_dev_warn: "Add the [FreeDroidWarn library](https://github.com/woheller69/FreeDroidWarn) to your apps to warn users."
act_dev_warn: >-
  Přidejte do svých aplikací [knihovnu FreeDroidWarn](https://github.com/woheller69/FreeDroidWarn), aby varovala uživatele.
# [en] act_dev_banner: "Run a website? [Add the countdown banner.](/banner)"
act_dev_banner: >-
