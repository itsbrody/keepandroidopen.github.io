social_callout_mastodon_7: "Když jste si koupili hardware, měli byste mít poslední slovo ohledně softwaru. Plán Googlu blokovat neověřené aplikace je přímý útok na uživatelskou suverenitu. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
# [en] social_callout_mastodon_8: "Imagine a world where every small hobbyist or volunteer dev has to register with a global corporation just to share their work. That's the world Google is building for Android in 2026. {url} @keepa..."
social_callout_mastodon_8: "Představte si svět, kde se každý malý nadšenec nebo dobrovolný vývojář musí registrovat u globální korporace, jen aby mohl sdílet svou práci. To je svět, který Google v roce 2026 buduje pro Android. {url} @keepandroidopen@techhub.social"
# [en] social_callout_mastodon_9: "Google's 'advanced flow' for sideloading is a deterrence mechanism, not an escape hatch. 9 steps and a 24-hour wait for software you own? No thanks. @keepandroidopen@techhub.social #KeepAndroidOpen..."
social_callout_mastodon_9: "Googleův \"advanced flow\" pro sideloading (instalace aplikací mimo oficiální obchod) je odstrašující mechanismus, nikoli východisko. 9 kroků a 24 hodin čekání na software, který vlastníte? Ne, díky. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_10: "Over 100,000 people and 67+ organizations are standing up to Google's attempt to lock down Android. Join the fight for a truly open mobile ecosystem. {url} @keepandroidopen@techhub.social #KeepAndr..."
social_callout_mastodon_10: "Více než 100 000 lidí a přes 67 organizací se postavilo proti pokusu Googlu uzamknout Android. Přidejte se k boji za skutečně otevřený mobilní ekosystém. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"

# [en] social_callout_facebook_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification. Apps from unregistered developers will be blocked on all..."
social_callout_facebook_1: "Od září 2026 bude Google vyžadovat, aby se každý vývojář aplikací pro Android centrálně zaregistroval a poskytl úřední doklad totožnosti. Aplikace neregistrovaných vývojářů budou zablokovány na všech certifikovaných zařízeních Android po celém světě. Týká se to všech aplikací, nejen těch z Obchodu Play. Více zde: {url}"
# [en] social_callout_facebook_2: "F-Droid, the open-source Android app store used by millions, calls Google's developer verification an \"existential threat\" to its continued operation. over 67 organizations including the EFF, FSF, ..."
social_callout_facebook_2: "F-Droid, open-source obchod s aplikacemi pro Android používaný miliony lidí, označuje ověřování vývojářů Googlu za \"existenční hrozbu\" pro své další fungování. Více než 67 organizací, včetně EFF, FSF a Tor Project, podepsalo otevřený dopis proti této politice. Zjistěte, proč je to důležité: {url}"
# [en] social_callout_facebook_3: "Google's proposed workaround for installing unverified apps after their lockdown takes effect requires 9 steps, a mandatory 24-hour waiting period, and runs through Google Play Services (which Goog..."
social_callout_facebook_3: "Navrhovaný postup od Googlu pro instalaci neověřených aplikací pro uzamčený Android bude vyžadovat 9 kroků, povinnou 24hodinovou čekací lhůtu a bude probíhat přes Google Play Services (které může Google kdykoli změnit). Komunita má přijmout jen příspěvek na blogu jako záruku. {url}"
# [en] social_callout_facebook_4: "Android's openness has been its defining characteristic for 17 years. Millions chose it over iPhone for exactly that reason. Google is now mandating developer registration for all apps, including t..."
social_callout_facebook_4: "Otevřenost je již 17 let hlavní charakteristikou Androidu. Právě z tohoto důvodu si jej miliony lidí vybraly namísto iPhonu. Google nyní zavádí povinnou registraci všech vývojářů aplikací, včetně těch distribuovaných mimo Obchod Play. Nejvíce postiženi budou nezávislí vývojáři a open-source projekty. {url}"
# [en] social_callout_facebook_5: "The EFF calls app gatekeeping \"a pathway to censorship.\" Google's developer verification would give a single company the ability to block any app, from any developer, on any certified device worldw..."
social_callout_facebook_5: "EFF označuje bránění aplikací za \"cestu k cenzuře\". Ověřování vývojářů ze strany Googlu by jedné společnosti dalo možnost blokovat jakoukoli aplikaci od jakéhokoli vývojáře na jakémkoli certifikovaném zařízení po celém světě. To vytváří precedens, který přesahuje Android a zasahuje do budoucnosti osobních počítačů. {url}"
# [en] social_callout_facebook_6: "Your phone, your choice? Not if Google has its way. Starting in 2026, they plan to block any app whose developer hasn't registered and provided government ID. This affects everyone. {url}"
social_callout_facebook_6: "Váš telefon, vaše volba? Ne, pokud si Google prosadí své. Od roku 2026 plánují zablokovat jakoukoli aplikaci, jejíž vývojář se nezaregistroval a neposkytl úřední doklad totožnosti. To se týká úplně všech. {url}"
# [en] social_callout_facebook_7: "Google is retroactively locking down billions of devices that were sold as open platforms. This 'rug pull' threatens independent developers and alternative app stores like F-Droid. {url}"
social_callout_facebook_7: "Google dodatečně uzamyká miliardy zařízení, která byla prodána jako otevřené platformy. Tento tzv. \"rug pull\", neboli podraz, ohrožuje nezávislé vývojáře a alternativní obchody jako F-Droid. {url}"
# [en] social_callout_facebook_8: "Is your phone really yours? If Google can decide which apps you're allowed to install, the answer is no. Join the 100,000+ people fighting to keep Android open. {url}"
social_callout_facebook_8: "Je váš telefon skutečně váš? Pokud Google rozhoduje, které aplikace smíte nainstalovat, odpověď zní ne. Přidejte se k více než 100 000 lidí, kteří bojují bojují za to, aby Android zůstal otevřený. {url}"
# [en] social_callout_facebook_9: "Google's 9-step process for 'allowing' unverified apps is a trap. It's designed to be so difficult that nobody uses it, giving Google total control. {url}"
social_callout_facebook_9: "Devítikrokový proces Googlu pro \"povolení\" neověřených aplikací je past. Je navržen tak, aby byl tak obtížný, že ho nikdo nepoužije, a Google tak získá úplnou kontrolu. {url}"
# [en] social_callout_facebook_10: "From students building their first apps to volunteers creating privacy tools, Google's mandatory registration policy will freeze out innovation. Help us keep Android open! {url}"
social_callout_facebook_10: "Od studentů, kteří tvoří své první aplikace, až po dobrovolníky vytvářející nástroje na ochranu soukromí - povinná registrace Googlu zastaví inovace. Pomozte nám udržet Android otevřený! {url}"

