  **[Kontaktujte své regulátory.](/cs/cta/#consumers)** Regulátoři po celém světě se skutečně obávají monopolů a centralizace moci v technologickém sektoru a chtějí slyšet přímo od jednotlivců, kterých se to týká.
# [en] act_share: "**Share this page.** Link to [keepandroidopen.org](https://keepandroidopen.org) everywhere."
act_share: >-
  **Sdílejte tuto stránku.** Vložte odkaz na [keepandroidopen.org](https://keepandroidopen.org) všude kam můžete.
