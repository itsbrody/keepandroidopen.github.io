# Meta
# [en] title: "Keep Android Open"
title: "Keep Android Open"
# [en] description: "Your phone is about to stop being yours. In September 2026, Google will block every Android app whose developer hasn't registered with them."
description: "Dein Smartphone wird bald nicht mehr Dir gehören. Im September 2026 wird Google alle Android-Apps sperren, deren Entwickler sich nicht bei Google registriert haben."

# Hero
# [en] hero_lede: "Your phone is about to stop being yours."
hero_lede: "Dein Handy wird bald nicht mehr dir gehören."
# [en] hero_countdown_label: "days until lockdown"
hero_countdown_label: "Tage bis zum Lockdown"
# [en] hero_sub: "Starting September 2026, a silent update, nonconsensually pushed by Google, will **block every Android app** whose developer hasn't registered with Google, signed their contract, paid up, and hande..."
hero_sub: "Ab September 2026 wird ein stilles Update von Google ohne Zustimmung der Nutzer **alle Android-Apps blockieren**, deren Entwickler sich nicht bei Google registriert, ihren Vertrag nicht unterzeichnet und nicht bezahlt haben."
# [en] hero_kicker: "Every app and every device, worldwide, with no opt-out."
hero_kicker: "Jede App und jedes Gerät, weltweit, ohne Möglichkeit des Widerspruchs."

# What Google is doing
# [en] what_heading: "What Google is doing"
what_heading: "Was Google tut"
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Googl..."
what_intro: >-
  Im August 2025 hat Google eine neue Bedingung [angekündigt](https://developer.android.com/developer-verification): ab September 2026 **muss sich jeder Android-App-Entwickler
  zentral bei Google anmelden** bevor seine oder ihre Software auf irgend einem Gerät installiert werden kann. Nicht nur Apps aus dem Play Store: alle Apps. Das beinhaltet auch Apps, die
  unter Freunden geteilt werden, die über [F-Droid](https://f-droid.org) verteilt werden, die von Hobbyisten zur persönlichen Verwendung entwickelt werden. Unabhängige Entwickler,
  Kirchen- und Gemeinschaftsgruppen sowie Hobbyisten werden gleichermaßen von der Entwicklung und der Weitergabe ihrer Software ausgeschlossen.
# [en] what_registration: "Registration requires:"
what_registration: "Für die Registrierung ist folgendes erforderlich:"
# [en] what_req_fee: "Paying a fee to Google"
what_req_fee: "Eine Gebühr an Google zahlen"
# [en] what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_terms: "Zustimmung zu den Nutzungsbedingungen von Google"
# [en] what_req_id: "Surrendering your government-issued identification"
what_req_id: "Abgabe des amtlichen Ausweises"
# [en] what_req_signing: "Providing evidence of your private signing key"
what_req_signing: "Nachweis des privaten Signaturschlüssels"
# [en] what_req_appids: "Listing all current and all future application identifiers"
what_req_appids: "Auflistung aller aktuellen und zukünftigen App-Bezeichner"
# [en] what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: "Wenn ein Entwickler sich nicht daran hält, werden seine Apps stillschweigend auf allen Android-Geräten weltweit gesperrt."

# Who this hurts
# [en] impact_heading: "Who this hurts"
impact_heading: "Wen trifft das?"
# [en] impact_you_heading: "You"
impact_you_heading: "Dich"
# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "Du hast Dich für ein Android-Smartphone entschieden, weil Google Dir versichert hat, dass es offen für neue Technologien sei. Du konntest installieren, was Du willst, und das war die Abmachung."
# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *..."
impact_you_p2: >-
  Google ändert diese Vereinbarung nun rückwirkend für bereits vorhandene Hardware. Nach dem Update kannst Du nur noch von Google vorab genehmigte Software nutzen. Auf Deinem Smartphone: *Deinem* Eigentum,
  wofür *Du* bezahlt hast.
# [en] impact_dev_heading: "Independent developers"
impact_dev_heading: "Unabhängige Entwickler"
# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: "Ob die erste App eines Teenagers, ein Datenschutztool für Freiwillige oder die vertrauliche interne Betaversion eines Unternehmens – das spielt keine Rolle. Nach September 2026 lässt sich keine dieser Apps mehr ohne Googles Zustimmung installieren."
# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-dec..."
impact_dev_p2: >-
  [F-Droid](https://f-droid.org), die Heimat Tausender kostenloser und Open-Source-Android-Apps, hat dies als eine
  ["existenzielle" Bedrohung](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html) bezeichnet.
  Cory Doctorow nennt es ["Darth Android"](https://pluralistic.net/2025/09/01/fulu/).
# [en] impact_gov_heading: "Governments & civil society"
impact_gov_heading: "Regierungen und Zivilgesellschaft"
# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that r..."
impact_gov_p1: >-
  Google hat eine [dokumentierte Erfolgsbilanz](https://www.aclu.org/news/free-speech/app-store-oligopoly) bei der Erfüllung von Forderungen autoritärer Regime nach App-Entfernungen.
  Mit diesem Programm wird die Software, die die Institutionen Ihres Landes steuert, dem Gutdünken eines einzigen, nicht rechenschaftspflichtigen ausländischen Konzerns unterworfen sein.
# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: >-
  Die [EFF bezeichnet](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) App-Gatekeeping "einen sich ständig erweiternden
  Weg zur Internetzensur."

# Advanced flow
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "Googles \"Notausgang\" ist eine Falltür"
# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: >-
  Google sagt, dass "Power-User" nicht überprüfte Apps [immer noch installieren](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) können.
  Hier erläutern wir, was das *tatsächlich* bedeutet:
# [en] flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "Öffne die Systemeinstellungen und suche nach den Entwickleroptionen."
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "Tippe **sieben Mal** auf die Build-Nummer, um den Entwicklermodus zu aktivieren."
# [en] flow_step3: "Dismiss scare screens about coercion"
flow_step3: "Ignoriere die Angstmacherei bezüglich Zwang."
# [en] flow_step4: "Enter your PIN"
flow_step4: "Gebe Deine PIN ein."
# [en] flow_step5: "Restart the device"
flow_step5: "Starte des Gerät neu."
# [en] flow_step6: "**Wait 24 hours**"
flow_step6: "**Warte 24 Stunden**."
# [en] flow_step7: "Come back, dismiss more scare screens"
flow_step7: "Komme zurück und blende weitere Angstbildschirme aus."
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: "Wähle \"vorübergehend erlauben\" (7 Tage) oder \"unbegrenzt erlauben\"."
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: "Bestätige, dass Du \"die Risiken\" verstehst."
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: "Neun Schritte. Eine obligatorische 24-stündige Bedenkzeit. *Zur Installtion von Software auf einem Gerät, was Dein Eigentum ist.*"
# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And ..."
flow_detail: >-
  Schlimmer noch: dieser Ablauf findet vollständig über die **Google Play Dienste** statt, nicht dem Android-Betriebssystem. Google kann dies jederzeit ändern, einschränken
  oder ganz abschalten, ohne dass ein Betriebssystem-Update oder eine Zustimmung erforderlich ist. Bis heute wurde es noch in keiner Beta-, Vorschau- oder Canary-Version veröffentlicht.
  Es existiert lediglich als Blogbeitrag und einigen Mockups.

# Precedent
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "Das ist größer als Android."
# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: "Wenn Google nachträglich Milliarden von Geräten sperren kann, die als offene Plattformen verkauft wurden, schaut jeder Hardwarehersteller auf dem Planeten genau hin."
# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at ..."
precedent_p1: >-
  Das Prinzip was eingeführt wird: **Das Unternehmen, welches Dein Gerät hergestellt hat, entscheidet nach dem Kauf, welche Software Du darauf ausführen darfst.** In der Softwarebranche spricht man
  von einem "Rug Pull"; zumindest könnte man aber immer noch Konkurrenzprodukte installieren. In der Hardwarebranche hingegen handelt es sich um eine vollendete Tatsache, die einem die Handlungsfähigkeit raubt
  und einen den Launen eines einzelnen, nicht zur Rechenschaft gezogenen Gatekeepers und verurteilten Monopolisten ausliefert.
# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally..."
precedent_p2: >-
  Die Offenheit von Android war nie nur ein Feature. Sie war das *Versprechen*, das es vom iPhone unterschied. Millionen entschieden sich genau aus diesem Grund für Android. Google widerruft dieses
  Versprechen nun einseitig - auf Geräten, die sich *bereits* in den Taschen der Nutzer befinden – weil das Unternehmen der Ansicht ist, dass seine Marktmacht und der Einfluss der Regulierungsbehörden
  ausreichen, um damit durchzukommen.
# [en] precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle And..."
precedent_arstechnica: >-
  [Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *"Googles Neid auf
  Apple droht, Androids offene Tradition zu zerstören."*

# Objections
# [en] objections_heading: "But wait, isn't this..."
objections_heading: "Aber Moment mal, ist das nicht..."
# [en] obj_security_q: "\"...just about security?\""
obj_security_q: "\"...nur zur Sicherheit?\""
# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* id..."
obj_security_a: >-
  Die Sicherheitsbegründung ist ein Vorwand. Google Play Protect scannt bereits unabhängig von der Entwickleridentität nach Malware. Die Pflicht zur Vorlage eines amtlichen Ausweises macht den Code
  nicht sicherer. Sie macht Entwickler identifizierbar und kontrollierbar. Malware-Autoren können sich registrieren. Indie-Entwickler und Dissidenten hingegen oft nicht.
  Die [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) (Economic Frontier Foundation)
  bringt es auf den Punkt: identitätsbasierte Zugangskontrolle ist ein Instrument der Zensur, nicht der Sicherheit.
# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: "\"...wird das auch bei Verwendung des erweiterten Ablaufs noch per Sideloading erfolgen?\""
# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** b..."
obj_sideloading_a: >-
  Neun Schritte, 24 Stunden Wartezeit, versteckt in den Entwickleroptionen, bereitgestellt über einen proprietären Dienst, den Google jederzeit widerrufen kann. Das ist kein Sideloading. Das ist ein
  **Abschreckungsmechanismus**, der sicherstellen soll, dass ihn praktisch niemand durchführt. Und da er über die Play-Dienste und nicht über das Betriebssystem läuft, kann Google ihn
  stillschweigend einschränken oder ganz abschalten.
# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: "\"...nur dann ein Problem, wenn man etwas zu verbergen hat?\""
# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distr..."
obj_hide_a: >-
  Whistleblower, Journalisten und Aktivisten unter autoritären Regierungen werden die ersten Opfer sein. Menschen in Fällen häuslicher Gewalt folgen als Nächstes. Alle diese Gruppen haben legitime Gründe,
  Software zu verbreiten oder zu nutzen, ohne ihre Identität in einer Google-Datenbank preiszugeben. Anonyme Open-Source-Beiträge sind eine Tradition, die älter ist als Google selbst. Diese Richtlinie
  beendet sie auf Android.
# [en] obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: "\"...das gleiche, was Apple macht?\""
# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory press..."
obj_apple_a: >-
  Apple war von Anfang an ein geschlossenes System. Die Leute wählten Android, weil es anders war. "Apple macht das auch" ist ein ruinöser Wettbewerb und ein schwaches *Tu-quoque*-Argument.
  Und unter dem Druck der Regulierungsbehörden (EU-Digitalgesetz) ist selbst Apple gezwungen, sich zu öffnen. Google geht den entgegengesetzten Weg: Es versucht, seine Gatekeeper-Position weiter zu festigen.
# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: "\"...nur 25 Dollar und etwas Papierkram?\""
# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health..."
obj_cost_a: >-
  Vielleicht, wenn Du ein Entwickler in den USA mit Kreditkarte und Führerschein bist. Versuche mal, Student in Subsahara-Afrika zu sein, Dissident in Myanmar oder Freiwilliger, der eine Gesundheits-App
  für die Gemeinschaft betreut. Die Kosten sind nicht nur finanzieller Natur: Du gibst deine Ausweispapiere und Nachweise oder deine Signaturschlüssel an ein Unternehmen ab, das
  [routinemäßig](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) staatlichen Forderungen nachkommt, Apps zu entfernen und
  Entwickler bloßzustellen.

