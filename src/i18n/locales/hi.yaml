act_everyone_heading: "आप सभी"
# [en] act_fdroid: "**[Install F-Droid](https://f-droid.org)** on every Android device you own. Alternative stores only survive if people actually use them."
act_fdroid: >-
  **[F-Droid इनस्टॉल करें](https://f-droid.org)**
  उन सभी Android डिवाइस पर जो आपके पास हैं। वैकल्पिक स्टोर्स सिर्फ तभी बचेंगे जब लोग उन्हें उपयोग करेंगे।
# [en] act_regulators: "**[Contact your regulators.](/cta/#consumers)** Regulators worldwide are genuinely concerned about monopolies and the centralization of power in the tech sector, and want to hear directly from indi..."
act_regulators: >-
  **[अपने regulators को इसके बारे में सूचित करें।](/cta/#consumers)**
  दुनियाभर के Regulators टेक सेक्टर में हो रहे monopolies तथा ताकत के केन्द्रीयकरण को लेकर गंभीर रूप से चिंतित हैं,
  और सीधे उन व्यक्तियों से सुनना चाहते हैं जो इससे प्रभावित और चिंतित हैं।
# [en] act_share: "**Share this page.** Link to [keepandroidopen.org](https://keepandroidopen.org) everywhere."
act_share: >-
  **इस पेज को शेयर करें।**
  [keepandroidopen.org](https://keepandroidopen.org) को हर जगह लिंक करें।
# [en] act_astroturf: "**Push back on astroturfers.** The \"well, actually...\" crowd is out in force. Don't let them set the narrative."
act_astroturf: '**भाड़े के टट्टुओं का डट कर मुक़ाबला करें।** ये "किन्तु-परन्तु" वाली फ़ौज भी जोर लगा रही है। उन्हें अपनी मनमर्ज़ी का नैरेटिव बनाने न दें।'
# [en] act_petition: "**[Sign the change.org petition](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)** and join the over 100,000 signatories who have made their voices heard."
act_petition: >-
  **इस [change.org petition](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/) पर हस्ताक्षर करें**
  और उन 100,000 से अधिक हस्ताक्षरकर्ताओं का साथ दें जिन्होंने अपनी आवाज़ उठाई है।
# [en] act_letter: "**[Read and share our open letter](/open-letter)**"
act_letter: '**[हमारे खुले पत्र को पढ़ें तथा शेयर करें](/open-letter)**'
# [en] act_survey: "**Tell Google what you think of this** through their own [developer verification survey](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <..."
act_survey: >-
  **गूगल को बताएं कि आप क्या सोचते हैं**, उनके ही
  [developer verification survey](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1)
  के द्वारा <small>(क्या पता अँधेरे में तीर सही निशाने पर लग जाए)</small>।
# [en] act_dev_heading: "Developers"
act_dev_heading: "डेवेलपर्स"
# [en] act_dev_intro: "<strong style=\"text-transform: uppercase;\">Do not sign up.</strong> Don't join the program by signing up for the Android Developer Console and agreeing to their irrevocable Terms and Conditions. Do..."
act_dev_intro: >-
  <strong style="text-transform: uppercase;">sign up न करें।</strong>
  Android Developer Console के लिए उनके प्रोग्राम को join करने के लिए sign up न करें
  और ऐसी नियमों एवं शर्तों को न मानें जिन्हें वापस नहीं लिया जा सकता।
  अपनी पहचान का सत्यापन न करें। *उनकी दाल मत गलने दो।*
# [en] act_dev_resist: "Google's plan only works if developers comply. Don't."
act_dev_resist: "गूगल का प्लान सिर्फ डेवेलपर्स की सहमति से ही काम कर सकता है। सहमति देने की भूल न करें।"
# [en] act_dev_talk: "Talk other developers and organizations out of signing up."
act_dev_talk: "वे डेवेलपर्स और संस्थान जो sign up कर रहे हैं या करना चाहते हैं उन्हें रोकें।"
# [en] act_dev_warn: "Add the [FreeDroidWarn library](https://github.com/woheller69/FreeDroidWarn) to your apps to warn users."
act_dev_warn: >-
  इस [FreeDroidWarn library](https://github.com/woheller69/FreeDroidWarn)
  को अपने users को सावधान करने के लिए अपने ऐप्प में जोड़ें।
# [en] act_dev_banner: "Run a website? [Add the countdown banner.](/banner)"
act_dev_banner: 'अगर आप एक वेबसाइट चलाते हैं तो इस [countdown banner](/banner) को अवश्य जोड़ें।'
# [en] act_google_heading: "Google employees"
act_google_heading: "Google employees"
# [en] act_google_text: "If you know something about the program's technical implementation or internal rationale, contact [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) from a *non-work* machine and a *non-Gm..."
act_google_text: >-
  अगर आप इस प्रोग्राम के तकनीकी कार्यान्वयन (technical implementation) या इसके आंतरिक तर्क (internal rationale) के बारे में कुछ जानते हैं,
  तो कृपया कार्यस्थल के कंप्यूटर और Gmail अकाउंट के बजाय किसी *अन्य निजी साधन* से हमें
  [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) पर संपर्क करें।
  आपकी गोपनीयता की पूर्ण गारंटी है।

